
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Flexbox Compilation</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
}

.header, .footer {
  background: #d8d5be;
  padding: 20px;
  text-align: center;
  border-top: 4px solid #fff;
  border-bottom: 4px solid #fff;
  margin-bottom: 10px;
}

/* Layout 1 */
.container-one {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 30px;
}

.section {
  background: rgb(211, 206, 255);
  color: white;
  padding: 40px;
  border-top: 5px solid black;
  border-bottom: 5px solid black;
}

.right {
  order: 1;
}

.left {
  order: 2;
}

.container-two {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 30px;
}

.left-two,
.right-two {
  background: green;
  color: black;
  padding: 20px;
  min-height: 200px;
}


.box {
  display: flex;
  gap: 5px;
  margin-bottom: 20px;
}

.item {
  background: rgb(9, 91, 118);
  padding: 10px;
  border: 1px solid #820707;
  text-align: center;
}

.container {
  display: flex;
  margin-bottom: 20px;
}

.item1 {
  width: 200px;
  background: rgb(22, 153, 65);
  padding: 10px;
}

.item2 {
  width: 75px;
  background: rgb(112, 168, 186);
  padding: 10px;
}

.box-b {
  border: 2px solid gray;
}

.box-b .item1 {
  width: 50px;
}

.box-b .item2 {
  flex: 1;
}

.box-b .item3 {
  width: 50px;
}

.box-c {
  justify-content: space-between;
}

.box-d {
  height: 50px;
  border: 2px solid gray;
  justify-content: space-between;
  align-items: center;
}

@media (min-width: 800px) {

  .container-one {
    flex-direction: row;
  }

  .left {
    order: 1;
    flex: 1;
  }

  .right {
    order: 2;
    flex: 2;
  }

  .container-two {
    flex-direction: row;
  }

  .left-two {
    flex: 1;
  }

  .right-two {
    flex: 2;
  }
}
</style>
</head>

<body>

<h1>Final Task 2. Using  CSS Flex Box</h1>

<h2>Flexbox Activities</h2>

<div class="container box-a">
  <div class="item item1">200px</div>
  <div class="item item2">75px</div>
</div>

<div class="box box-b">
  <div class="item item1">item1</div>
  <div class="item item2">item2</div>
  <div class="item item3">item3</div>
</div>

<div class="box box-c">
  <div class="item">item1</div>
  <div class="item">item2</div>
  <div class="item">item3</div>
  <div class="item">item4</div>
</div>

<div class="box box-d">
  <div class="item">item1</div>
  <div class="item">item2</div>
</div>

<div class="header">This is a Header</div>

<div class="container-two">
  <div class="left-two">Section left-nav</div>
  <div class="right-two">Section right-nav</div>
</div>



<div class="header">This is a Header</div>

<div class="container-one">
  <div class="right section">Section right-nav</div>
  <div class="left section">Section left-nav</div>
</div>
<div class="footer">This is a Footer</div>


</body>
</html>
